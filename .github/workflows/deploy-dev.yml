name: Deploy to Dev

on:
  push:
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-dev
  cancel-in-progress: false  # Queue deploys; don't cancel in-flight deployments

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with AWS

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml

  deploy:
    name: Deploy to Dev
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: dev  # GitHub environment — configure protection rules as needed

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_DEV }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_DEV }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE_DEV }}
      ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION_DEV }}
      CONTAINER_NAME: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-deploy-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --tag "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true  # Block until deployment completes or fails
          codedeploy-appspec: ""            # ECS native deployment (not CodeDeploy)
